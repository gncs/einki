# --------------------------------------------------------------------------
# HTTP server — redirect all traffic to HTTPS
# --------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Permanent redirect (301) to the HTTPS version of the same URL
    return 301 https://$host$request_uri;
}

# --------------------------------------------------------------------------
# HTTPS server — terminate TLS and proxy to the einki Flask app
# --------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name _;

    # --- Let's Encrypt certificate paths ---
    # These are symlinks managed by certbot inside the letsencrypt volume.
    # The volume is mounted read-only into this container; certbot writes
    # from a separate container.
    ssl_certificate     /etc/letsencrypt/live/cert/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cert/privkey.pem;

    # --- TLS hardening ---
    # Only allow TLS 1.2+ (disable SSLv3, TLS 1.0, TLS 1.1)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Let the server choose the cipher (not the client)
    ssl_prefer_server_ciphers on;

    # Modern cipher suite — balances security and compatibility
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # --- HSTS (HTTP Strict Transport Security) ---
    # Tell browsers to always use HTTPS for this domain for 1 year.
    # After the first visit, the browser will never send an HTTP request.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # --- Reverse proxy to einki ---
    location / {
        # Forward requests to the einki container on port 5000
        proxy_pass http://einki:5000;

        # Pass the original hostname so Flask knows what domain was visited
        proxy_set_header Host $host;

        # Pass the real client IP (otherwise Flask sees the container IP)
        proxy_set_header X-Real-IP $remote_addr;

        # Chain of proxy IPs — standard header for proxied requests
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Tell Flask the original request was HTTPS
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
